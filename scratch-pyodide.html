<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
</head>
<body>
  <script>
    async function main() {
      let pyodide = await loadPyodide();
      pyodide.setStdin({ stdin: () => window.prompt("Input") });
      pyodide.runPython("print('You said:', input('Say something: '))");
    }
    main();
  </script>
</body>
</html>
